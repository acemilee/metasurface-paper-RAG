name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  publish:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/acemilee/metasurface-paper-rag
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/acemilee/metasurface-paper-RAG
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.licenses=AGPL-3.0-only
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PAPER_RAG_VERSION=${{ steps.version.outputs.value }}
            PAPER_RAG_REVISION=${{ github.sha }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/acemilee/metasurface-paper-rag
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - shell: bash
        run: |
          printf 'Image: `ghcr.io/acemilee/metasurface-paper-rag:%s`\n\nDigest: `%s`\n\nSource: `%s`\n' \
            '${{ steps.version.outputs.value }}' '${{ steps.build.outputs.digest }}' '${{ github.sha }}' > release-notes.md
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md
