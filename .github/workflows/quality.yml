name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src scripts tests
      - run: python -m pytest -q
      - run: python scripts/release_audit.py inventory --output release-artifacts/release-inventory.txt
      - run: python scripts/release_audit.py check --paths-file release-artifacts/release-inventory.txt
      - run: docker compose config --quiet
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.13'
        with:
          name: release-inventory
          path: release-artifacts/release-inventory.txt
