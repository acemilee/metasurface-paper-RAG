name: Published image audit

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/acemilee/metasurface-paper-rag@sha256:a78ed0769aaf6b5a0d2a09eb7a4a86904d9f0dbf08b7df2ade5d59b07523210f
  RELEASE_DIR: /tmp/metasurface-paper-RAG-v0.1.0
  COMPOSE_PROJECT_NAME: metasurface_paper_rag_release_acceptance

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone the public release tag
        shell: bash
        run: |
          git clone --branch v0.1.0 --depth 1 \
            https://github.com/acemilee/metasurface-paper-RAG.git "$RELEASE_DIR"
          cd "$RELEASE_DIR"
          test "$(git rev-parse HEAD)" = "66ef7358b3eb89d988558e01b82f49146d71a1fe"
          python scripts/release_audit.py check-tracked

      - name: Pull anonymously and verify the runtime
        shell: bash
        run: |
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" python -c \
            "import pathlib; import fitz; import paper_rag; assert pathlib.Path('/app/LICENSE').is_file(); assert pathlib.Path('/app/THIRD_PARTY_NOTICES.md').is_file(); print(fitz.__doc__.splitlines()[0])"

      - name: Scan the published root filesystem
        shell: bash
        run: |
          container_id=$(docker create "$IMAGE")
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker export "$container_id" | tar -tf - > "$RUNNER_TEMP/image-files.txt"
          grep -qx 'app/LICENSE' "$RUNNER_TEMP/image-files.txt"
          grep -qx 'app/THIRD_PARTY_NOTICES.md' "$RUNNER_TEMP/image-files.txt"
          grep -qx 'app/src/' "$RUNNER_TEMP/image-files.txt"
          if grep -Ei '^app/.*\.pdf$|^app/\.env$|^app/data/uploads/.+|^app/data/chroma/.+|^app/models/.+|^app/.*\.db$|^app/.*\.sqlite$|^app/.*\.log$|^app/docs/|^app/evals/' "$RUNNER_TEMP/image-files.txt"; then
            echo "Forbidden private content found in the published image." >&2
            exit 1
          fi

      - name: Start the clean clone and verify readiness
        working-directory: ${{ env.RELEASE_DIR }}
        shell: bash
        run: |
          PAPER_RAG_IMAGE="$IMAGE" sh scripts/start_services.sh --no-browser --wait-timeout 1800
          curl --fail --silent http://127.0.0.1:8010/ready | tee "$RUNNER_TEMP/readiness.json"
          curl --fail --silent --output /dev/null http://127.0.0.1:8010/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: published-image-audit
          path: |
            ${{ runner.temp }}/image-files.txt
            ${{ runner.temp }}/readiness.json
          if-no-files-found: warn

      - name: Clean up acceptance services
        if: always()
        working-directory: ${{ env.RELEASE_DIR }}
        shell: bash
        run: |
          docker compose down --volumes --remove-orphans || true
          rm -rf data models .env
